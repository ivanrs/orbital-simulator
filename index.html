<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newton's Cannonball — Orbital Velocity Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e27;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  h1 { font-size: 1.3rem; font-weight: 600; margin: 14px 0 2px; color: #fff; }
  .subtitle { font-size: 0.82rem; color: #7a8ba8; margin-bottom: 8px; }
  canvas { border-radius: 12px; }
  .controls {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; margin-top: 12px; width: 580px; max-width: 92vw;
  }
  .speed-display {
    font-size: 1.25rem; font-weight: 700;
    min-height: 1.8em; text-align: center; transition: color 0.3s;
  }
  .speed-display.sub { color: #ff6b6b; }
  .speed-display.orb { color: #51cf66; }
  .speed-display.esc { color: #ffd43b; }
  input[type="range"] {
    -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px;
    background: linear-gradient(to right, #ff6b6b 0%, #ff6b6b 61%, #51cf66 61%, #51cf66 87%, #ffd43b 87%);
    outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.5); cursor: pointer; border: none;
  }
  .labels { display: flex; justify-content: space-between; width: 100%; font-size: 0.7rem; color: #5a6a80; margin-top: 2px; }
  .info { font-size: 0.72rem; color: #5a6a80; margin-top: 8px; }

</style>
</head>
<body>

<h1>🌍 Newton's Cannonball</h1>
<p class="subtitle">What happens when you throw something fast enough?</p>
<canvas id="c"></canvas>
<div class="controls">
  <div class="speed-display sub" id="lbl">0 km/h</div>
  <input type="range" id="sl" min="0" max="1000" value="100" step="1">
  <div class="labels">
    <span>Drop</span><span>Falls nearby</span><span>Travels far</span>
    <span style="color:#51cf66">Orbital!</span><span style="color:#ffd43b">Escape!</span>
  </div>
</div>
<p class="info">Drag the slider to change horizontal launch speed</p>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');
const sl = document.getElementById('sl');
const lbl = document.getElementById('lbl');

const W = Math.min(680, window.innerWidth - 30);
const H = Math.round(W * 0.88);
C.width = W; C.height = H;

const ER = W * 0.22;
const ECX = W / 2;
const ECY = H * 0.58;

const GM = ER * ER * 2.0;
const LAUNCH_R = ER * 1.09;
const LX = ECX;
const LY = ECY - LAUNCH_R;

const V_ORB = Math.sqrt(GM / LAUNCH_R);
const V_ESC = V_ORB * Math.sqrt(2);
const ORB_FRAC = 1 / (Math.SQRT2 * 1.15);
const ESC_FRAC = 1 / 1.15;
const R_ESC = 40300;

// Stars
const stars = [];
{ let s = 7; const r = () => { s = (s*16807)%2147483647; return s/2147483647; };
  for (let i = 0; i < 140; i++) stars.push({x:r()*W, y:r()*H, sz:r()*1.2+0.2, a:r()*0.5+0.1}); }

let trail = [], proj = null, frac = 0, ghost = [];

// Preload Earth image
const earthImg = new Image();
earthImg.crossOrigin = 'anonymous';
earthImg.src = 'https://upload.wikimedia.org/wikipedia/commons/2/22/Earth_Western_Hemisphere_transparent_background.png';

function drawEarth() {
  X.save();

  // === ATMOSPHERE OUTER GLOW (before clip) ===
  const atm = X.createRadialGradient(ECX, ECY, ER * 0.88, ECX, ECY, ER * 1.18);
  atm.addColorStop(0,   'rgba(72,148,255,0.00)');
  atm.addColorStop(0.4, 'rgba(72,148,255,0.25)');
  atm.addColorStop(0.8, 'rgba(100,180,255,0.12)');
  atm.addColorStop(1,   'rgba(100,180,255,0.00)');
  X.fillStyle = atm;
  X.beginPath(); X.arc(ECX, ECY, ER * 1.18, 0, Math.PI*2); X.fill();

  // Clip everything below to the sphere
  X.beginPath(); X.arc(ECX, ECY, ER, 0, Math.PI*2); X.clip();

  // === EARTH IMAGE ===
  // The PNG's solid surface occupies only ~87.5% of the image diameter.
  // Scale up by 1/0.875 so the visible Earth fills the physics collision radius exactly.
  const EARTH_SCALE = 1 / 0.875;
  const d = ER * 2 * EARTH_SCALE;
  if (earthImg.complete && earthImg.naturalWidth > 0) {
    X.drawImage(earthImg, ECX - ER * EARTH_SCALE, ECY - ER * EARTH_SCALE, d, d);
  } else {
    X.fillStyle = '#1466a3';
    X.fillRect(ECX-ER, ECY-ER, ER*2, ER*2);
  }

  // === LIMB DARKENING ===
  const limb = X.createRadialGradient(ECX, ECY, ER*0.52, ECX, ECY, ER*1.01);
  limb.addColorStop(0,   'rgba(0,5,20,0.00)');
  limb.addColorStop(0.65,'rgba(0,5,20,0.04)');
  limb.addColorStop(1,   'rgba(0,5,20,0.62)');
  X.fillStyle = limb; X.fillRect(ECX-ER, ECY-ER, d, d);

  // === SPECULAR HIGHLIGHT ===
  const spec = X.createRadialGradient(ECX - ER*0.30, ECY - ER*0.38, 0, ECX - ER*0.30, ECY - ER*0.38, ER*0.60);
  spec.addColorStop(0,   'rgba(255,255,255,0.20)');
  spec.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  spec.addColorStop(1,   'rgba(255,255,255,0.00)');
  X.fillStyle = spec; X.fillRect(ECX-ER, ECY-ER, d, d);

  X.restore(); // end clip
}

function predict(speed) {
  let x = LX, y = LY, vx = speed, vy = 0;
  const dt = 0.15, pts = [{x, y}];
  for (let i = 0; i < 12000; i++) {
    const dx = x-ECX, dy = y-ECY, d = Math.sqrt(dx*dx+dy*dy);
    if (d < ER*0.99) break;
    if (d > ER*8) break;
    if (i > 300) { const ds = Math.sqrt((x-LX)**2+(y-LY)**2); if (ds < ER*0.06) break; }
    const a = -GM/(d*d*d);
    vx += a*dx*dt; vy += a*dy*dt;
    x += vx*dt; y += vy*dt;
    if (i % 4 === 0) pts.push({x, y});
  }
  return pts;
}

function reset() {
  frac = sl.value / 1000;
  const speed = frac * V_ESC * 1.15;
  proj = {x:LX, y:LY, vx:speed, vy:0, alive:true};
  trail = [];
  ghost = predict(speed);

  const rKmh = Math.round((frac / ESC_FRAC) * R_ESC);
  let txt = `${rKmh.toLocaleString()} km/h`, cls = 'sub';
  if (frac >= ESC_FRAC)  { txt += ' — Escape velocity! 🚀'; cls = 'esc'; }
  else if (frac >= ORB_FRAC) { txt += ' — Orbital! 🌍'; cls = 'orb'; }
  lbl.textContent = txt;
  lbl.className = 'speed-display ' + cls;
}

function step() {
  if (!proj || !proj.alive) return;
  const dt = 0.15, n = 8;
  for (let i = 0; i < n; i++) {
    const dx = proj.x-ECX, dy = proj.y-ECY, d = Math.sqrt(dx*dx+dy*dy);
    if (d < ER*0.99) { proj.alive = false; return; }
    if (d > ER*8)    { proj.alive = false; return; }
    const a = -GM/(d*d*d);
    proj.vx += a*dx*dt; proj.vy += a*dy*dt;
    proj.x  += proj.vx*dt; proj.y += proj.vy*dt;
    trail.push({x:proj.x, y:proj.y});
    if (trail.length > 6000) trail.shift();
  }
}

function color3() {
  return frac >= ESC_FRAC ? [255,212,59] : frac >= ORB_FRAC ? [81,207,102] : [255,107,107];
}

function draw() {
  // Background
  X.fillStyle = '#0a0e27';
  X.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    X.globalAlpha = s.a; X.fillStyle = '#fff';
    X.beginPath(); X.arc(s.x, s.y, s.sz, 0, 7); X.fill();
  }
  X.globalAlpha = 1;

  // ISS orbit ring
  X.save();
  X.setLineDash([3,7]);
  X.strokeStyle = 'rgba(100,210,255,0.20)';
  X.lineWidth = 1.2;
  X.beginPath(); X.arc(ECX, ECY, LAUNCH_R, 0, Math.PI*2); X.stroke();
  X.setLineDash([]);
  X.fillStyle = 'rgba(120,210,255,0.40)';
  X.font = `${Math.round(W*0.016)}px system-ui`;
  X.fillText('ISS altitude', ECX + LAUNCH_R*0.68, ECY - LAUNCH_R*0.72);
  X.restore();

  // Earth
  drawEarth();

  // Launch tether (surface → cannon)
  X.save();
  X.setLineDash([2,3]);
  X.strokeStyle = 'rgba(255,212,59,0.22)';
  X.lineWidth = 1;
  X.beginPath(); X.moveTo(ECX, ECY - ER); X.lineTo(LX, LY); X.stroke();
  X.setLineDash([]);
  X.restore();

  // Ghost trail
  if (ghost.length > 1) {
    const c = color3();
    X.setLineDash([3,5]);
    X.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},0.15)`;
    X.lineWidth = 1.5;
    X.beginPath(); X.moveTo(ghost[0].x, ghost[0].y);
    for (let i = 1; i < ghost.length; i++) X.lineTo(ghost[i].x, ghost[i].y);
    X.stroke(); X.setLineDash([]);
  }

  // Active trail
  if (trail.length > 1) {
    const c = color3();
    X.lineWidth = 2.5;
    for (let i = 1; i < trail.length; i++) {
      const al = Math.max(0.04, (i/trail.length)*0.9);
      X.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${al})`;
      X.beginPath(); X.moveTo(trail[i-1].x, trail[i-1].y); X.lineTo(trail[i].x, trail[i].y); X.stroke();
    }
  }

  // Launch marker + cannon
  X.fillStyle = '#ffd43b';
  X.beginPath(); X.arc(LX, LY, 4, 0, 7); X.fill();
  X.strokeStyle = '#ffd43b'; X.lineWidth = 2.5;
  X.beginPath(); X.moveTo(LX, LY); X.lineTo(LX, LY-14); X.stroke();
  X.strokeStyle = 'rgba(255,212,59,0.4)'; X.lineWidth = 1.5;
  X.beginPath(); X.moveTo(LX, LY); X.lineTo(LX+20, LY); X.stroke();

  // Projectile
  if (proj && proj.alive) {
    const c = color3().join(',');
    const g = X.createRadialGradient(proj.x, proj.y, 0, proj.x, proj.y, 16);
    g.addColorStop(0, `rgba(${c},0.7)`); g.addColorStop(1, `rgba(${c},0)`);
    X.fillStyle = g; X.beginPath(); X.arc(proj.x, proj.y, 16, 0, 7); X.fill();
    X.fillStyle = `rgb(${c})`; X.beginPath(); X.arc(proj.x, proj.y, 4, 0, 7); X.fill();
  }

  // Impact flash
  if (proj && !proj.alive && trail.length > 0) {
    const p = trail[trail.length-1];
    if (Math.sqrt((p.x-ECX)**2+(p.y-ECY)**2) < ER*1.05) {
      X.fillStyle = 'rgba(255,180,80,0.5)';
      X.beginPath(); X.arc(p.x, p.y, 8, 0, 7); X.fill();
    }
  }
}

function loop() { step(); draw(); requestAnimationFrame(loop); }
sl.addEventListener('input', reset);

setInterval(() => {
  if (proj && !proj.alive && frac >= ORB_FRAC && frac < ESC_FRAC) reset();
}, 200);

reset();
loop();
</script>
</body>
</html>
